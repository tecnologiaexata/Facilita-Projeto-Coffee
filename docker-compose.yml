services:
  coffee-counter-backend:
    build:
      context: ./backend
      args:
        INSTALL_SAM2: ${FCC_INSTALL_SAM2:-0}
        SAM2_REPO_REF: ${FCC_SAM2_REPO_REF:-main}
    container_name: facilita-projeto-contagem-backend
    environment:
      FCC_STORAGE_DIR: /app/storage
      FCC_SAM2_ENABLED: ${FCC_SAM2_ENABLED:-0}
      FCC_SAM2_DEVICE: ${FCC_SAM2_DEVICE:-cpu}
      FCC_SAM2_CONFIG: ${FCC_SAM2_CONFIG:-configs/sam2.1/sam2.1_hiera_s.yaml}
      FCC_SAM2_CHECKPOINT: /app/storage/sam2/checkpoints/${FCC_SAM2_CHECKPOINT_FILE:-sam2.1_hiera_small.pt}
    volumes:
      - ./storage:/app/storage
    labels:
      autoheal: "true"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  coffee-counter-frontend:
    build:
      context: ./frontend
    container_name: facilita-projeto-contagem-frontend
    depends_on:
      coffee-counter-backend:
        condition: service_healthy
    labels:
      autoheal: "true"
    ports:
      - "8050:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  coffee-counter-autoheal:
    image: willfarrell/autoheal:latest
    container_name: facilita-projeto-contagem-autoheal
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 10
      AUTOHEAL_START_PERIOD: 30
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
